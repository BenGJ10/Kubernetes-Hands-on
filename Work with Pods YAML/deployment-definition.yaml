apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-replicaset
  labels:
    app: nginx

spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 3  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80