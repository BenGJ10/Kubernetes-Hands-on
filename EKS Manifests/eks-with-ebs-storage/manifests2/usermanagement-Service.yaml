# This is a Service manifest that exposes the User Management Microservice internally within the Kubernetes cluster. 
# The Service is of type NodePort, which allows it to be accessed from outside the cluster on a specific port.
# The Service selects the pods with the label "app: usermgmt-restapp" and forwards traffic to port 8095 of those pods. The nodePort is set to 31231
# which means that the microservice can be accessed from outside the cluster using any node's IP address and this port. 

apiVersion: v1
kind: Service
metadata:
  name: usermgmt-restapp-service
  labels: 
    app: usermgmt-restapp
spec:
  type: NodePort
  selector:
    app: usermgmt-restapp
  ports: 
    - port: 8095
      targetPort: 8095
      nodePort: 31231